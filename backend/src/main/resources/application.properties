# Application Name
spring.application.name=backend

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:cinestream;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# Database Configuration (PostgreSQL - Commented out)
# spring.datasource.url=jdbc:postgresql://localhost:5432/cinestream
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# SECURITY: Use environment variables for sensitive data
myapp.jwt.secret=${JWT_SECRET:default-secret-only-for-local-dev-change-in-production}
# 24 hours in milliseconds
myapp.jwt.expiration=${JWT_EXPIRATION:86400000}

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled=true

# TMDB (optional): if empty, system will store placeholder poster URLs
# tmdb.api.key=YOUR_TMDB_API_KEY

# Auto sync posters at startup (for movies with tmdbId but missing posterUrl)
poster.sync.on-startup=true
poster.sync.fetch-batch-size=100
poster.sync.save-batch-size=100
poster.sync.max-movies=300

# SECURITY: TMDB API key should be set via environment variable
# Get your key from: https://www.themoviedb.org/settings/api
tmdb.api.key=${TMDB_API_KEY:}